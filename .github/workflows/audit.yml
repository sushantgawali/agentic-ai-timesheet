name: Timesheet Audit

on:
  push:
    branches: [main]
  workflow_dispatch:        # manual trigger from Actions tab
  schedule:
    - cron: "0 6 * * 1"   # every Monday at 06:00 UTC

jobs:
  audit:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: write       # needed to push accumulated reports to gh-pages branch
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run audit agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATA_DIR: data
          OUT_DIR: output
        run: python3 audit_agent.py

      - name: Restore previous reports from gh-pages
        run: |
          git fetch origin gh-pages || true
          mkdir -p site
          if git ls-remote --exit-code origin gh-pages > /dev/null 2>&1; then
            git --work-tree=site checkout origin/gh-pages -- .
          fi

      - name: Copy new report to site
        run: cp output/audit_*.html site/

      - name: Generate index.html
        run: python3 generate_index.py site/

      - name: Save reports to gh-pages branch
        run: |
          cd site
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"
          git add .
          git commit -m "audit: add report $(date +%Y-%m-%d)"
          git push origin gh-pages --force

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: audit
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
