name: Timesheet Audit

on:
  workflow_dispatch:        # manual trigger only — run from the Actions tab
    inputs:
      data_version:
        description: "Data version to audit"
        default: "v5"
        required: true
        type: choice
        options:
          - v5
          - v3
          - v2
          - v1
      model:
        description: "Claude model to use"
        default: "claude-haiku-4-5-20251001"
        required: false
        type: choice
        options:
          - claude-haiku-4-5-20251001
          - claude-sonnet-4-6
          - claude-opus-4-6

jobs:
  audit:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: write       # needed to push accumulated reports to gh-pages branch
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run audit agent (Agent SDK)
        id: sdk_run
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATA_DIR: data/${{ inputs.data_version || 'v5' }}
          OUT_DIR: output
          MODEL: ${{ inputs.model || 'claude-haiku-4-5-20251001' }}
          REVIEW_MODEL: claude-sonnet-4-6
        run: python3 audit_agent_sdk.py

      - name: Run audit agent (fallback — direct API)
        id: fallback_run
        if: steps.sdk_run.outcome == 'failure'
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATA_DIR: data/${{ inputs.data_version || 'v5' }}
          OUT_DIR: output
          MODEL: ${{ inputs.model || 'claude-haiku-4-5-20251001' }}
        run: python3 audit_agent.py

      - name: Check report was generated
        run: |
          if ! ls output/audit_*.html 1> /dev/null 2>&1; then
            echo "ERROR: No HTML report found in output/. Both SDK and fallback agents failed."
            exit 1
          fi
          echo "Report found: $(ls output/audit_*.html)"

      - name: Restore previous reports from gh-pages
        run: |
          git fetch origin gh-pages || true
          mkdir -p site
          if git ls-remote --exit-code origin gh-pages > /dev/null 2>&1; then
            git --work-tree=site checkout origin/gh-pages -- .
          fi

      - name: Copy new report to site
        run: cp output/audit_*.html site/

      - name: Generate index.html
        run: python3 generate_index.py site/

      - name: Save reports to gh-pages branch
        run: |
          cd site
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/$GITHUB_REPOSITORY"
          git add .
          git commit -m "audit: add report $(date +%Y-%m-%d)"
          git push origin gh-pages --force

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: audit
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
